apiVersion: v1
kind: Namespace
metadata:
  name: ns-mario-abarca
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-mario-abarca
  namespace: ns-mario-abarca
data:
  AMBIENTE: produccion
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-mario-abarca
  namespace: ns-mario-abarca
stringData:
  API_KEY: "12345"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-mario-abarca
  namespace: ns-mario-abarca
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-mario-abarca
  template:
    metadata:
      labels:
        app: app-mario-abarca
    spec:
      containers:
      - name: app-mario-abarca
        image: abarcamario/tarea-final:1.0.0
        ports:
        - containerPort: 3000
        env:
        - name: AMBIENTE
          valueFrom:
            configMapKeyRef:
              name: config-mario-abarca
              key: AMBIENTE
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: secret-mario-abarca
              key: API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: svc-mario-abarca
  namespace: ns-mario-abarca
spec:
  type: NodePort
  selector:
    app: app-mario-abarca
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 31000
